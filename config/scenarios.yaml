scenarios:
  base:
    description: "Empirically calibrated defaults."
    overrides: {}

  jevons_holds:
    description: "Strong demand expansion: high capture rate, large backlog, underserved markets."
    overrides:
      context: {annual_cost_reduction_rate: 0.20}
      demand:
        backlog_initial_months: 12.0
        parkinson_coefficient: 0.20
        underserved_fraction: 0.50
        underserved_threshold: 0.20
        induced_market_size: 0.35
      market:
        consumer_capture_rate: {consumer: 0.90, smb: 0.75, enterprise: 0.50, regulated: 0.35}
      labor:
        alpha_experienced: -0.05
        alpha_routine: 0.35
        g_tools: 0.25

  jevons_fails:
    description: "Productivity dominates: rapid tool improvement, savings not passed to market."
    overrides:
      context: {annual_cost_reduction_rate: 0.25}
      labor:
        alpha_experienced: 0.15
        alpha_routine: 0.50
        f_auto: 0.60
        f_verify: 0.08
        g_tools: 0.45
      market:
        consumer_capture_rate: {consumer: 0.15, smb: 0.10, enterprise: 0.06, regulated: 0.03}
      demand:
        backlog_initial_months: 3.0
        parkinson_coefficient: 0.60
        underserved_fraction: 0.05
        induced_market_size: 0.05

  metr_generalizes:
    description: "METR 19% slowdown persists; tools fail to improve for experienced devs."
    overrides:
      labor:
        alpha_experienced: -0.30
        alpha_routine: 0.05
        g_tools: 0.05
        f_verify: 0.45
      context: {annual_cost_reduction_rate: 0.04}

  high_parkinson:
    description: "Strong Parkinson's Law: capacity fills as fast as it's created."
    overrides:
      demand:
        parkinson_coefficient: 0.75
        agentic_expansion_rate: 0.20

  high_ai_debt:
    description: "AI-generated code creates severe technical debt burden."
    overrides:
      demand:
        ai_debt_premium: 0.65
        debt_productivity_drag: 0.006
        speed_pressure_factor: 0.30

  new_markets:
    description: "Underserved SMB/global markets unlock at scale."
    overrides:
      context: {annual_cost_reduction_rate: 0.22}
      demand:
        underserved_fraction: 0.55
        underserved_threshold: 0.12
        induced_market_size: 0.40
      market:
        consumer_capture_rate: {consumer: 0.85, smb: 0.80, enterprise: 0.45, regulated: 0.25}

  incumbent_capture:
    description: "Software firms retain all efficiency gains as margin."
    overrides:
      market:
        consumer_capture_rate: {consumer: 0.10, smb: 0.08, enterprise: 0.04, regulated: 0.02}
      demand:
        backlog_initial_months: 3.0
        underserved_fraction: 0.05

  # V5 cognitive scenarios
  cognitive_conservative:
    description: "V5 cognitive tools with conservative assumptions. 30% scope max, slow growth."
    overrides:
      cognitive:
        alpha_cognitive: 0.10
        cognitive_scope_max: 0.20
        cognitive_growth_rate: 0.10
        cognitive_maturation_years: 10.0

  cognitive_optimistic:
    description: "V5 cognitive tools with optimistic assumptions. 50% scope max, faster growth."
    overrides:
      cognitive:
        alpha_cognitive: 0.25
        cognitive_scope_max: 0.50
        cognitive_growth_rate: 0.25
        cognitive_maturation_years: 6.0

  cognitive_off:
    description: "V5 with cognitive tools disabled. Reproduces v4 base exactly."
    overrides:
      cognitive:
        alpha_cognitive: 0.0
        cognitive_scope_max: 0.0
        cognitive_growth_rate: 0.0

  # Break-even sensitivity scenarios (explicit parameter variants)
  fast_tools:
    description: "g_tools=0.35: aggressive tool improvement. Break-even arrives year 3-4."
    overrides:
      labor: {g_tools: 0.35}

  slow_tools:
    description: "g_tools=0.10: slow tool improvement. Employment may never decline within the simulation horizon."
    overrides:
      labor: {g_tools: 0.10}

  low_parkinson:
    description: "parkinson=0.10: weak Parkinson effect. Demand exhausts sooner, earlier break-even."
    overrides:
      demand: {parkinson_coefficient: 0.10}

  high_parkinson:
    description: "parkinson=0.45: strong Parkinson effect. Demand persists, later break-even."
    overrides:
      demand: {parkinson_coefficient: 0.45}

  fast_maturation:
    description: "alpha matures in 3yr: tools overcome METR drag sooner, earlier break-even."
    overrides:
      labor: {alpha_maturation_years: 3.0}

  slow_maturation:
    description: "alpha matures in 8yr: METR drag persists longer, very late break-even."
    overrides:
      labor: {alpha_maturation_years: 8.0}
